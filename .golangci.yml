run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goconst
    - gocritic
    - revive
    - gosec
    - unparam
    - misspell
    - dogsled
    - whitespace
    - bodyclose

linters-settings:
  govet:
    shadow: true
  revive:
    rules:
      - name: exported
        severity: warning
      - name: blank-imports
        severity: warning
      - name: line-length-limit
        arguments: [150] # Raised to 150 to accommodate longer Cobra descriptions and log statements
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
  gosec:
    excludes:
      - G104 # Handled separately and more granularly by the errcheck linter
  errcheck:
    exclude-functions:
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Printf
      - fmt.Println
      - (*net.TCPConn).Close
      - (*net.TCPListener).Close
      - (net.Conn).Close
      - (net.Listener).Close
      - os.Setenv
      - os.Unsetenv
      - os.RemoveAll

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
